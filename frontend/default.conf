server {
    listen       80;
    server_name  localhost;

    # 包含 MIME 类型映射（解决报错的核心）
    include /etc/nginx/mime.types;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # 单页应用路由兜底
        try_files $uri $uri/ /index.html;
    }

    # 静态资源找不到时直接 404，别去乱走兜底逻辑
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404; 
    }
}